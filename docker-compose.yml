version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: campanhas_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-campanhas_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${DB_NAME:-campanhas_eleitorais}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - campanhas_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-campanhas_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: campanhas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - campanhas_network
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campanhas_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-campanhas_user}:${DB_PASSWORD:-secure_password_123}@postgres:5432/${DB_NAME:-campanhas_eleitorais}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - campanhas_network
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campanhas_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - campanhas_network
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:
  redis_data:

networks:
  campanhas_network:
    driver: bridge
